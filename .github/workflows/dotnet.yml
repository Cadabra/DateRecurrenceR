# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
          9.0.x
          10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test with coverage
      run: >-
        dotnet test --no-build --verbosity normal
        --settings coverlet.runsettings
        --results-directory ./coverage
    - name: Enforce coverage thresholds
      shell: bash
      env:
        MIN_LINE: "95"
        MIN_BRANCH: "90"
      run: |
        reports=$(find ./coverage -name 'coverage.cobertura.xml')
        if [ -z "$reports" ]; then echo "No coverage report found"; exit 1; fi
        # The test project is multi-targeted, so every target framework produces its own
        # report; enforce the thresholds on each one instead of an arbitrary first match.
        python3 - $reports <<'PY'
        import sys, os, xml.etree.ElementTree as ET
        min_line = float(os.environ["MIN_LINE"])
        min_branch = float(os.environ["MIN_BRANCH"])
        failed = False
        for path in sys.argv[1:]:
            root = ET.parse(path).getroot()
            line = float(root.get("line-rate", 0)) * 100
            branch = float(root.get("branch-rate", 0)) * 100
            print(f"{path}")
            print(f"  line coverage:   {line:.1f}% (min {min_line:.0f}%)")
            print(f"  branch coverage: {branch:.1f}% (min {min_branch:.0f}%)")
            if line < min_line:
                print(f"::error::Line coverage {line:.1f}% is below the {min_line:.0f}% threshold in {path}"); failed = True
            if branch < min_branch:
                print(f"::error::Branch coverage {branch:.1f}% is below the {min_branch:.0f}% threshold in {path}"); failed = True
        sys.exit(1 if failed else 0)
        PY
